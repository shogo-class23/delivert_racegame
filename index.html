<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆走！激走デリバリー</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #87CEEB; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); pointer-events: none; }
        #speed { font-size: 24px; font-weight: bold; }
        #nitro-bar { width: 200px; height: 10px; background: rgba(0,0,0,0.5); border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #nitro-fill { width: 0%; height: 100%; background: #ff4500; transition: width 0.1s; }
        
        #fuel-ui { display: block; }
        #fuel-container { width: 200px; height: 15px; background: rgba(0,0,0,0.5); border-radius: 5px; margin-top: 5px; overflow: hidden; border: 1px solid #fff; }
        #fuel-fill { width: 100%; height: 100%; background: #32cd32; transition: width 0.3s; }
        
        #mission-ui {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: gold; padding: 15px 40px; border-radius: 30px;
            font-size: 22px; font-weight: bold; border: 3px solid gold; text-align: center;
        }
        #interact-prompt {
            position: absolute; bottom: 300px; left: 50%; transform: translateX(-50%);
            background: gold; color: #000; padding: 10px 20px; border-radius: 10px;
            font-size: 24px; font-weight: bold; display: none; animation: pulse 1s infinite;
        }
        
        #center-alert {
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            color: #ff0000; font-size: 60px; font-weight: bold; text-align: center;
            text-shadow: 0 0 20px rgba(255,0,0,0.8);
            pointer-events: none; display: none; z-index: 200;
            animation: alert-anim 2s forwards;
        }
        @keyframes alert-anim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.2); }
        }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.1); } 100% { transform: translateX(-50%) scale(1); } }

        #map-container {
            position: absolute; bottom: 20px; right: 20px; width: 250px; height: 250px;
            background: rgba(0, 0, 0, 0.6); border: 3px solid #0f0; border-radius: 15px; overflow: hidden;
        }
        #map-canvas { width: 100%; height: 100%; }

        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
        .start-button { padding: 15px 40px; font-size: 24px; border: none; border-radius: 30px; color: white; cursor: pointer; margin: 10px; width: 300px; transition: transform 0.2s; }
        .start-button:hover { transform: scale(1.05); }
        #bike-btn { background: #ff4500; border: 3px solid #fff; }
        #bus-btn { background: #0044aa; border: 3px solid #00ffff; }

        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.6); display: none; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 101; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="speed">時速: 0 km/h</div>
        <div id="nitro-label">激辛ニトロ</div>
        <div id="nitro-bar"><div id="nitro-fill"></div></div>
        <div id="fuel-ui">
            <div id="fuel-label" style="margin-top: 10px;">燃料 (GAS)</div>
            <div id="fuel-container"><div id="fuel-fill"></div></div>
        </div>
        <div id="score" style="margin-top: 10px; font-size: 18px;">配達距離: 0m</div>
        <div id="deliv-count" style="margin-top: 5px; font-size: 20px; color: gold;">完了数: 0</div>
    </div>

    <div id="mission-ui">
        <div id="mission-text">出発進行！</div>
        <div id="distance-text" style="font-size: 28px; color: #fff; margin-top: 5px;">あと ---m</div>
    </div>
    <div id="center-alert">🚨 燃料不足！</div>
    <div id="interact-prompt">E キーでアクション！</div>

    <div id="map-container">
        <div id="map-label" style="position: absolute; top: 5px; width: 100%; text-align: center; color: #0f0; font-size: 14px; font-weight: bold; font-family: monospace;">PRO NAVI</div>
        <canvas id="map-canvas"></canvas>
    </div>

    <div id="start-screen">
        <h1 style="font-size: 48px; margin-bottom: 5px;">爆走！デリバリー ＆ バス</h1>
        <p style="margin-bottom: 25px;">W:アクセル S:ブレーキ A/D:ハンドル E:停車/アクション</p>
        <button id="bike-btn" class="start-button">🛵 バイクモード（激走配達）</button>
        <button id="bus-btn" class="start-button">🚌 バスモード（安全運行）</button>
    </div>

    <div id="game-over">
        <h1 style="font-size: 64px; margin-bottom: 10px;">事故発生！</h1>
        <p id="cause" style="font-size: 20px; margin-bottom: 20px; color: #ffaaaa;"></p>
        <p id="final-score" style="font-size: 28px; margin-bottom: 30px;"></p>
        <div style="display: flex; gap: 20px;">
            <button id="retry-btn" class="start-button" style="width: 220px; background: #ff4500; border: 3px solid #fff;">もう一度挑戦</button>
            <button onclick="location.reload()" class="start-button" style="width: 220px; background: #555; border: 3px solid #ccc;">ホームへ戻る</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- 設定 ---
        const GRID_SIZE = 120;
        const ROAD_WIDTH = 16;
        const ACCEL = 0.02;
        const DECEL = 0.01;
        const BRAKE = 0.04;
        const SPEED_MAX = 0.7;
        const SPEED_NITRO_MAX = 1.4;
        const STEER_SPEED = 0.04;
        
        let gameState = 'START';
        let gameMode = 'BIKE'; // 'BIKE' or 'BUS'
        let missionState = 'PICKUP'; 
        let speed = 0;
        let nitroTimer = 0;
        let fuel = 100;
        const fuelMax = 100;
        let score = 0;
        let deliveryCount = 0;
        let currentRotationY = 0;
        let direction = new THREE.Vector3(0, 0, -1);
        
        // --- 目的地管理 ---
        let targetPos = new THREE.Vector3();
        let targetGX = 0, targetGZ = 0;
        let fuelTargetPos = new THREE.Vector3();
        let fuelTargetGX = 0, fuelTargetGZ = 0;
        let needsRefuel = false; 
        
        let immuneBuilding = null; 
        let navLine, fuelNavLine; 

        // --- 信号機管理 ---
        let trafficPhase = 0; 
        let trafficTimer = 0;
        let trafficLights = []; 

        // --- 電車管理 ---
        const trains = []; 
        let trainTimer = 0;
        const crossingGates = []; 

        // --- 一般車 (NPC) 管理 ---
        const npcCars = []; 
        let carSpawnTimer = 0;
        
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 300);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(100, 200, 100); sun.castShadow = true;
        scene.add(sun);

        // --- 乗り物作成 ---
        function createCub() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.8, 1.5), new THREE.MeshStandardMaterial({ color: 0x0055aa }));
            body.position.y = 0.6; group.add(body);
            const cargo = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
            cargo.position.set(0, 1.3, 0.6); // 背面に配置
            cargo.visible = false; group.add(cargo);
            group.cargo = cargo;
            const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.2, 16);
            const front = new THREE.Mesh(wheelGeo, new THREE.MeshStandardMaterial({ color: 0x111111 }));
            front.rotation.z = Math.PI/2; front.position.set(0, 0.35, -0.8); group.add(front); // 前輪
            const back = front.clone(); back.position.set(0, 0.35, 0.8); group.add(back); // 後輪
            return group;
        }

        function createBus() {
            const group = new THREE.Group();
            // ボディ (青いバス)
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 2.5, 8), new THREE.MeshStandardMaterial({ color: 0x0044aa }));
            body.position.y = 1.5; group.add(body);
            // 窓
            const winGeo = new THREE.BoxGeometry(2.6, 1.2, 7.5);
            const winMat = new THREE.MeshBasicMaterial({ color: 0x88ffff, transparent: true, opacity: 0.6 });
            const win = new THREE.Mesh(winGeo, winMat);
            win.position.y = 2.0; group.add(win);
            // タイヤ (6輪) - 前方に1対、後方に2対
            const wheelGeo = new THREE.CylinderGeometry(0.6, 0.6, 0.5, 16);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            [[-1, 0, -3], [1, 0, -3], // 前輪
             [-1, 0, 2], [1, 0, 2], [-1, 0, 3.5], [1, 0, 3.5]].forEach(([x,y,z]) => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2; w.position.set(x * 1.2, 0.6, z); group.add(w);
            });
            return group;
        }

        let playerVehicle;
        function setupVehicle(mode) {
            if (playerVehicle) scene.remove(playerVehicle);
            if (mode === 'BIKE') {
                playerVehicle = createCub();
                playerVehicle.scale.set(1.8, 1.8, 1.8);
            } else {
                playerVehicle = createBus();
                playerVehicle.scale.set(1.2, 1.2, 1.2);
            }
            playerVehicle.position.set(-4, 0, 40);
            currentRotationY = 0; // 初期向きをリセット
            scene.add(playerVehicle);
        }

        // --- バス停作成 ---
        function createBusStop() {
            const group = new THREE.Group();
            // 標識
            const pole = new THREE.Mesh(new THREE.BoxGeometry(0.2, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            pole.position.y = 2; group.add(pole);
            const sign = new THREE.Mesh(new THREE.CircleGeometry(0.6, 16), new THREE.MeshStandardMaterial({ color: 0xffffff }));
            sign.position.y = 3.8; sign.position.z = 0.1; group.add(sign);
            const inner = new THREE.Mesh(new THREE.CircleGeometry(0.5, 16), new THREE.MeshStandardMaterial({ color: 0x0044aa }));
            inner.position.y = 3.8; inner.position.z = 0.11; group.add(inner);
            return group;
        }
        const busStopModel = createBusStop();
        busStopModel.visible = false;
        scene.add(busStopModel);

        // --- 3Dガイドラインの初期化 ---
        const navLineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(), new THREE.Vector3()]);
        const navLineMat = new THREE.LineDashedMaterial({ color: 0xffff00, dashSize: 2, gapSize: 1, linewidth: 3 });
        navLine = new THREE.Line(navLineGeo, navLineMat);
        scene.add(navLine);

        const fuelNavLineMat = new THREE.LineDashedMaterial({ color: 0x32cd32, dashSize: 1, gapSize: 1, linewidth: 2, transparent: true, opacity: 0.7 });
        fuelNavLine = new THREE.Line(navLineGeo.clone(), fuelNavLineMat);
        scene.add(fuelNavLine);

        // --- 目的地マーカー ---
        const marker = new THREE.Group();
        const beam = new THREE.Mesh(new THREE.CylinderGeometry(4, 4, 200, 16, 1, true), new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
        beam.position.y = 100; marker.add(beam);
        const ring = new THREE.Mesh(new THREE.TorusGeometry(5, 0.5, 16, 32), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
        ring.rotation.x = Math.PI/2; marker.add(ring);
        scene.add(marker);

        const fuelMarker = new THREE.Group();
        const fuelBeam = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 200, 16, 1, true), new THREE.MeshBasicMaterial({ color: 0x32cd32, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
        fuelBeam.position.y = 100; fuelMarker.add(fuelBeam);
        const fuelRing = new THREE.Mesh(new THREE.TorusGeometry(4, 0.4, 16, 32), new THREE.MeshBasicMaterial({ color: 0x32cd32 }));
        fuelRing.rotation.x = Math.PI/2; fuelMarker.add(fuelRing);
        fuelMarker.visible = false;
        scene.add(fuelMarker);

        function setRandomTarget(isFuelOnly = false) {
            let spawnDist = 2; 

            if (gameMode === 'BIKE' && fuel < 30 && !needsRefuel) {
                needsRefuel = true;
                const alert = document.getElementById('center-alert');
                alert.style.display = 'block';
                setTimeout(() => { alert.style.display = 'none'; }, 2000);
                
                fuelTargetGX = Math.round((playerVehicle.position.x / GRID_SIZE) + (Math.random() > 0.5 ? 1 : -1));
                fuelTargetGZ = Math.round((playerVehicle.position.z / GRID_SIZE) + (Math.random() > 0.5 ? 1 : -1));
                fuelTargetPos.set(fuelTargetGX * GRID_SIZE - 40, 0, fuelTargetGZ * GRID_SIZE - 40);
                fuelMarker.position.copy(fuelTargetPos);
                fuelMarker.visible = true;
                fuelNavLine.visible = true;
            }

            if (!isFuelOnly) {
                targetGX = Math.round((playerVehicle.position.x / GRID_SIZE) + (Math.random() > 0.5 ? spawnDist : -spawnDist));
                targetGZ = Math.round((playerVehicle.position.z / GRID_SIZE) + (Math.random() > 0.5 ? spawnDist : -spawnDist));
                
                if (gameMode === 'BIKE') {
                    targetPos.set(targetGX * GRID_SIZE - 40, 0, targetGZ * GRID_SIZE - 40);
                } else {
                    // バス停: 交差点から離れた(40)道路脇(左車線外側)に設置
                    // 南北の道路か東西の道路かをランダムに決定
                    const onNS = Math.random() > 0.5;
                    if (onNS) {
                        const laneSide = Math.random() > 0.5 ? 8 : -8; // 道路の右端か左端か
                        targetPos.set(targetGX * GRID_SIZE + laneSide, 0, targetGZ * GRID_SIZE + (Math.random() > 0.5 ? 40 : -40));
                    } else {
                        // 線路タイル(gz%4===0)を避ける
                        if (targetGZ % 4 === 0) targetGZ++;
                        const laneSide = Math.random() > 0.5 ? 8 : -8;
                        targetPos.set(targetGX * GRID_SIZE + (Math.random() > 0.5 ? 40 : -40), 0, targetGZ * GRID_SIZE + laneSide);
                    }
                    busStopModel.position.copy(targetPos);
                    busStopModel.visible = true;
                }
                marker.position.copy(targetPos);
            }
            
            // UI更新
            if (gameMode === 'BIKE') {
                if (missionState === 'PICKUP') {
                    beam.material.color.set(0xffff00); ring.material.color.set(0xffff00);
                    navLine.material.color.set(0xffff00);
                    document.getElementById('mission-text').innerText = "お店（黄色の建物）へ荷物を取りに行け！";
                    document.getElementById('mission-ui').style.color = "gold";
                } else {
                    beam.material.color.set(0x00ffff); ring.material.color.set(0x00ffff);
                    navLine.material.color.set(0x00ffff);
                    document.getElementById('mission-text').innerText = "お届け先（青色の家）へ配達せよ！";
                    document.getElementById('mission-ui').style.color = "#00ffff";
                }
                if (needsRefuel) document.getElementById('mission-text').innerText += "\n⛽ 同時に給油（緑色）も必要だ！";
            } else {
                beam.material.color.set(0x00ffff); ring.material.color.set(0x00ffff);
                navLine.material.color.set(0x00ffff);
                document.getElementById('mission-text').innerText = "次のバス停（青い光）へ向かえ！";
                document.getElementById('mission-ui').style.color = "#00ffff";
            }

            // 【安全な削除】無限ループを回避
            roads.clear();
            const toRemove = [];
            scene.children.forEach(child => { if (child.isRoad) toRemove.push(child); });
            toRemove.forEach(child => scene.remove(child));
            buildingMeshes.length = 0;
        }

        // --- 道路・建物 ---
        const roads = new Map();
        const buildingMeshes = [];

        function createCar() {
            const group = new THREE.Group();
            const colors = [0xffffff, 0x333333, 0xcc0000, 0x0044aa, 0xaaaaaa];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            // ボディ
            const body = new THREE.Mesh(new THREE.BoxGeometry(2.5, 1.5, 5), new THREE.MeshStandardMaterial({ color: color }));
            body.position.y = 0.75; group.add(body);
            // 屋根
            const roof = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1, 3), new THREE.MeshStandardMaterial({ color: color }));
            roof.position.set(0, 1.8, -0.2); group.add(roof);
            // 窓
            const win = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.8, 2.8), new THREE.MeshBasicMaterial({ color: 0x222222 }));
            win.position.set(0, 1.8, -0.2); group.add(win);
            // ライト
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.4, 0.2), new THREE.MeshBasicMaterial({ color: 0xffffaa }));
            head.position.set(-0.8, 0.8, 2.5); group.add(head);
            const head2 = head.clone(); head2.position.x = 0.8; group.add(head2);

            group.isCar = true;
            scene.add(group);
            return group;
        }

        function createTrafficLight(x, z) {
            const group = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 12), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            pole.position.y = 6; group.add(pole);

            const box = new THREE.Mesh(new THREE.BoxGeometry(2, 5, 2), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            box.position.set(0, 11, 0); group.add(box);

            const lights = { ns: {red:[], yellow:[], green:[]}, ew: {red:[], yellow:[], green:[]} };

            for(let i=0; i<4; i++) {
                const angle = i * (Math.PI / 2);
                const lGroup = new THREE.Group();
                lGroup.rotation.y = angle;
                const side = (i % 2 === 0) ? lights.ns : lights.ew;

                // 各ライトの配置設定 (高さ, 色名)
                const config = [
                    { y: 12.5, type: 'red', off: 0x220000, on: 0xff0000 },
                    { y: 11.0, type: 'yellow', off: 0x222200, on: 0xffff00 },
                    { y: 9.5,  type: 'green', off: 0x002200, on: 0x00ff00 }
                ];

                config.forEach(c => {
                    // ライト本体 (少し大きく 0.6)
                    const light = new THREE.Mesh(
                        new THREE.CircleGeometry(0.6, 16),
                        new THREE.MeshBasicMaterial({ color: c.off })
                    );
                    light.position.set(0, c.y, 1.01);
                    lGroup.add(light);
                    side[c.type].push(light);

                    // ひさし (バイザー)
                    const visor = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.7, 0.7, 0.8, 16, 1, true, 0, Math.PI),
                        new THREE.MeshStandardMaterial({ color: 0x111111, side: THREE.DoubleSide })
                    );
                    visor.rotation.x = Math.PI / 2;
                    visor.position.set(0, c.y + 0.3, 1.2);
                    lGroup.add(visor);
                });

                group.add(lGroup);
            }

            group.position.set(x, 0, z);
            group.isTrafficLight = true;
            trafficLights.push({ group, lights });
            return group;
        }

        function createTrain() {
            const group = new THREE.Group();
            // 先頭車両から数両分
            for(let i=0; i<8; i++) {
                const car = new THREE.Mesh(
                    new THREE.BoxGeometry(20, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.8, roughness: 0.2 })
                );
                car.position.x = i * 22;
                // 窓
                const winGeo = new THREE.BoxGeometry(2, 1.5, 6.2);
                const winMat = new THREE.MeshBasicMaterial({ color: 0x88ffff });
                for(let j=-4; j<=4; j++) {
                    const w = new THREE.Mesh(winGeo, winMat);
                    w.position.set(j*2, 1, 0);
                    car.add(w);
                }
                group.add(car);
            }
            scene.add(group);
            return group;
        }

        function createCrossing(x, z, gz) {
            const group = new THREE.Group();
            
            // 踏切の柱 (左右に2つ)
            [-1, 1].forEach(side => {
                const pGroup = new THREE.Group();
                pGroup.position.set(side * 8, 0, 0);
                
                // 柱
                const pole = new THREE.Mesh(new THREE.BoxGeometry(0.5, 8, 0.5), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                pole.position.y = 4; pGroup.add(pole);

                // 警告灯の箱
                const box = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 0.5), new THREE.MeshStandardMaterial({ color: 0x111111 }));
                box.position.y = 6; pGroup.add(box);

                // 警告灯 (前後に2つずつ、計4つ)
                const createLamp = (lx, lz) => {
                    const l = new THREE.Mesh(new THREE.CircleGeometry(0.4, 16), new THREE.MeshBasicMaterial({ color: 0x330000 }));
                    l.position.set(lx, 6, lz);
                    pGroup.add(l);
                    return l;
                };
                const l1_f = createLamp(-0.5, 0.26); // 前
                const l2_f = createLamp(0.5, 0.26);  // 前
                const l1_b = createLamp(-0.5, -0.26); // 後
                const l2_b = createLamp(0.5, -0.26);  // 後
                l1_b.rotation.y = Math.PI;
                l2_b.rotation.y = Math.PI;

                // 遮断機の棒 (黄色と黒)
                const barGroup = new THREE.Group();
                barGroup.position.set(0, 4, 0);
                const bar = new THREE.Mesh(new THREE.BoxGeometry(8, 0.3, 0.3), new THREE.MeshStandardMaterial({ color: 0xffff00 }));
                bar.position.x = -side * 4;
                barGroup.add(bar);
                // 黒い縞模様（簡易的に）
                for(let i=0; i<4; i++) {
                    const stripe = new THREE.Mesh(new THREE.BoxGeometry(1, 0.35, 0.35), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                    stripe.position.x = -side * (i * 2 + 1);
                    barGroup.add(stripe);
                }
                barGroup.rotation.z = Math.PI / 2; // 最初は上がっている状態
                pGroup.add(barGroup);

                group.add(pGroup);
                crossingGates.push({ barGroup, lights: [l1_f, l2_f, l1_b, l2_b], gz: gz });
            });

            group.position.set(x, 0, z);
            return group;
        }

        function createRoadTile(gx, gz) {
            const group = new THREE.Group();
            group.isRoad = true;
            const rx = gx * GRID_SIZE, rz = gz * GRID_SIZE;
            
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE), new THREE.MeshStandardMaterial({ color: 0x3d7a35 }));
            grass.rotation.x = -Math.PI/2; grass.position.y = -0.02; group.add(grass);
            
            const roadV = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH, GRID_SIZE), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            roadV.rotation.x = -Math.PI/2; group.add(roadV);

            const isRailway = (gz % 4 === 0);
            if (isRailway) {
                const ballast = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE, 10), new THREE.MeshStandardMaterial({ color: 0x555555 }));
                ballast.rotation.x = -Math.PI/2; ballast.position.y = 0.01; group.add(ballast);
                const railGeo = new THREE.BoxGeometry(GRID_SIZE, 0.3, 0.3);
                const railMat = new THREE.MeshStandardMaterial({ color: 0x999999, metalness: 1 });
                const r1 = new THREE.Mesh(railGeo, railMat); r1.position.set(0, 0.4, -2); group.add(r1);
                const r2 = new THREE.Mesh(railGeo, railMat); r2.position.set(0, 0.4, 2); group.add(r2);
                for(let i=-10; i<=10; i++) {
                    const s = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.2, 6), new THREE.MeshStandardMaterial({ color: 0x442200 }));
                    s.position.set(i * 6, 0.2, 0); group.add(s);
                }
                // 踏切を追加
                group.add(createCrossing(0, -8, gz)); // 北側
                group.add(createCrossing(0, 8, gz));  // 南側
            } else {
                const roadH = new THREE.Mesh(new THREE.PlaneGeometry(GRID_SIZE, ROAD_WIDTH), new THREE.MeshStandardMaterial({ color: 0x333333 }));
                roadH.rotation.x = -Math.PI/2; group.add(roadH);
            }

            // 信号機の配置 (四隅 - 線路でない場合のみ)
            if (!isRailway) {
                const offset = 9;
                group.add(createTrafficLight(-offset, -offset));
                group.add(createTrafficLight(offset, -offset));
                group.add(createTrafficLight(offset, offset));
                group.add(createTrafficLight(-offset, offset));
            }

            // 建物
            const bSize = 30; const bOffset = 40;
            [[-1,-1], [1,-1], [-1,1], [1,1]].forEach(([sx, sz]) => {
                const isTarget = (gx === targetGX && gz === targetGZ && sx === -1 && sz === -1);
                const isFuelTarget = (needsRefuel && gx === fuelTargetGX && gz === fuelTargetGZ && sx === -1 && sz === -1);
                
                const h = 10 + Math.random()*30;
                let color = 0x777777;
                let special = false;
                
                if (isTarget) {
                    if (missionState === 'PICKUP') color = 0xffcc00;
                    else if (missionState === 'DELIVERY') color = 0x00ccff;
                    special = true;
                } else if (isFuelTarget) {
                    color = 0x32cd32;
                    special = true;
                }

                const b = new THREE.Mesh(new THREE.BoxGeometry(bSize, h, bSize), new THREE.MeshStandardMaterial({ color: color }));
                b.position.set(sx * bOffset, h/2, sz * bOffset); b.castShadow = true; group.add(b);
                buildingMeshes.push({ pos: new THREE.Vector3(rx + sx * bOffset, 0, rz + sz * bOffset), size: bSize, isTarget: special });
            });
            group.position.set(rx, 0, rz); scene.add(group); return group;
        }

        // --- 障害物 (削除済み) ---
        function spawn() {
            // ミッションに関わるスポーンが必要な場合はここに記述（現在はなし）
        }
        setInterval(spawn, 1000);

        // --- マップ ---
        const mapCanvas = document.getElementById('map-canvas');
        const mapCtx = mapCanvas.getContext('2d');
        mapCanvas.width = 250; mapCanvas.height = 250;
        function updateMap() {
            if (!playerVehicle) return;
            mapCtx.clearRect(0,0,250,250);
            mapCtx.fillStyle = 'rgba(0, 20, 0, 0.8)'; mapCtx.fillRect(0,0,250,250);
            const cx=125, cz=125, mapScale = 0.4;
            mapCtx.save(); mapCtx.translate(cx, cz); mapCtx.rotate(-currentRotationY);
            mapCtx.strokeStyle = '#004400';
            for(let x=-2; x<=2; x++) {
                const lx = (Math.round(playerVehicle.position.x/GRID_SIZE) + x) * GRID_SIZE - playerVehicle.position.x;
                mapCtx.beginPath(); mapCtx.moveTo(lx * mapScale, -125); mapCtx.lineTo(lx * mapScale, 125); mapCtx.stroke();
            }
            for(let z=-2; z<=2; z++) {
                const lz = (Math.round(playerVehicle.position.z/GRID_SIZE) + z) * GRID_SIZE - playerVehicle.position.z;
                mapCtx.beginPath(); mapCtx.moveTo(-125, lz * mapScale); mapCtx.lineTo(125, lz * mapScale); mapCtx.stroke();
            }
            
            const toMapX = (rx) => (rx - playerVehicle.position.x) * mapScale;
            const toMapZ = (rz) => (rz - playerVehicle.position.z) * mapScale;

            // 経路表示 (道路に沿ったL字ルート)
            const drawRoute = (target_pos, color, dash = [8, 4]) => {
                mapCtx.setLineDash(dash);
                mapCtx.strokeStyle = color;
                mapCtx.lineWidth = 5;
                mapCtx.beginPath();
                mapCtx.moveTo(0, 0);

                // 中間地点: 道路の交差点 (自機の現在のX道路、ターゲットのZ道路)
                const midX = Math.round(playerVehicle.position.x / GRID_SIZE) * GRID_SIZE;
                const midZ = target_pos.z;
                const cornerX = midX;
                const cornerZ = midZ;

                mapCtx.lineTo(toMapX(cornerX), toMapZ(playerVehicle.position.z));
                mapCtx.lineTo(toMapX(cornerX), toMapZ(cornerZ));
                mapCtx.lineTo(toMapX(target_pos.x), toMapZ(target_pos.z));
                mapCtx.stroke();
            };

            // メインルート
            const mainColor = gameMode === 'BIKE' ? (missionState === 'PICKUP' ? 'gold' : '#0ff') : '#00ffff';
            drawRoute(targetPos, mainColor);

            // ガソスタルート
            if (gameMode === 'BIKE' && needsRefuel) {
                drawRoute(fuelTargetPos, '#32cd32', [4, 4]);
                drawTargetIcon(fuelTargetPos.x, fuelTargetPos.z, 'REFUEL');
            }

            // ターゲットアイコン描画
            function drawTargetIcon(tx_val, tz_val, type) {
                const tx = toMapX(tx_val);
                const tz = toMapZ(tz_val);
                mapCtx.fillStyle = (type === 'PICKUP') ? 'gold' : (type === 'DELIVERY' ? '#0ff' : (type === 'REFUEL' ? '#32cd32' : '#00ffff'));
                mapCtx.shadowBlur = 15; mapCtx.shadowColor = mapCtx.fillStyle;
                mapCtx.beginPath(); mapCtx.moveTo(tx, tz - 12); mapCtx.lineTo(tx - 8, tz + 6); mapCtx.lineTo(tx + 8, tz + 6);
                mapCtx.closePath(); mapCtx.fill(); mapCtx.shadowBlur = 0;
            }

            mapCtx.setLineDash([]);
            drawTargetIcon(targetPos.x, targetPos.z, gameMode === 'BIKE' ? missionState : 'BUSSTOP');
            
            mapCtx.restore();
            mapCtx.fillStyle = '#0af'; mapCtx.beginPath(); mapCtx.arc(cx, cz, 5, 0, Math.PI*2); mapCtx.fill();
            mapCtx.beginPath(); mapCtx.moveTo(cx, cz-12); mapCtx.lineTo(cx-7, cz+2); mapCtx.lineTo(cx+7, cz+2); mapCtx.fill();
        }

        // --- 入力 ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (e.code === 'KeyE' && gameState === 'PLAYING') checkInteraction();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function checkInteraction() {
            if (gameMode === 'BIKE') {
                // バイクモードの判定
                if (playerVehicle.position.distanceTo(targetPos) < 30 && Math.abs(speed) < 0.1) {
                    immuneBuilding = targetPos.clone();
                    if (missionState === 'PICKUP') {
                        missionState = 'DELIVERY'; playerVehicle.cargo.visible = true; setRandomTarget();
                    } else if (missionState === 'DELIVERY') {
                        missionState = 'PICKUP'; playerVehicle.cargo.visible = false; deliveryCount++; score += 1000;
                        document.getElementById('deliv-count').innerText = `完了数: ${deliveryCount}`;
                        setRandomTarget(); nitroTimer = 300;
                    }
                    return;
                }
                // 給油
                if (needsRefuel && playerVehicle.position.distanceTo(fuelTargetPos) < 30 && Math.abs(speed) < 0.1) {
                    immuneBuilding = fuelTargetPos.clone(); fuel = 100; needsRefuel = false;
                    fuelMarker.visible = false; fuelNavLine.visible = false; setRandomTarget(true);
                }
            } else {
                // バスモードの判定
                const stopDist = playerVehicle.position.distanceTo(targetPos);
                if (stopDist < 25 && Math.abs(speed) < 0.1) {
                    deliveryCount++;
                    score += 500;
                    document.getElementById('deliv-count').innerText = `バス停通過: ${deliveryCount}`;
                    
                    // アラート表示
                    const alert = document.getElementById('center-alert');
                    alert.innerText = "🚌 発車します。次は〜...";
                    alert.style.color = "#00ffff";
                    alert.style.display = 'block';
                    setTimeout(() => { alert.style.display = 'none'; }, 2000);
                    
                    setRandomTarget();
                }
            }
        }

        let hasViolated = false; 
        let intersectionProcessed = false; // 現在の交差点の判定が終了したか

        function update() {
            if (gameState === 'PLAYING') {
                // 信号機の状態更新
                trafficTimer++;
                const updateLights = () => {
                    if (trafficPhase === 0 && trafficTimer > 400) { trafficPhase = 1; trafficTimer = 0; }
                    else if (trafficPhase === 1 && trafficTimer > 150) { trafficPhase = 2; trafficTimer = 0; }
                    else if (trafficPhase === 2 && trafficTimer > 100) { trafficPhase = 3; trafficTimer = 0; }
                    else if (trafficPhase === 3 && trafficTimer > 400) { trafficPhase = 4; trafficTimer = 0; }
                    else if (trafficPhase === 4 && trafficTimer > 150) { trafficPhase = 5; trafficTimer = 0; }
                    else if (trafficPhase === 5 && trafficTimer > 100) { trafficPhase = 0; trafficTimer = 0; }
                    
                    trafficLights = trafficLights.filter(tl => tl.group.parent !== null);
                    trafficLights.forEach(tl => {
                        const l = tl.lights;
                        const nsS = (trafficPhase === 0) ? 'G' : (trafficPhase === 1 ? 'Y' : 'R');
                        l.ns.red.forEach(m => m.material.color.set(nsS === 'R' ? 0xff0000 : 0x220000));
                        l.ns.yellow.forEach(m => m.material.color.set(nsS === 'Y' ? 0xffff00 : 0x222200));
                        l.ns.green.forEach(m => m.material.color.set(nsS === 'G' ? 0x00ff00 : 0x002200));
                        const ewS = (trafficPhase === 3) ? 'G' : (trafficPhase === 4 ? 'Y' : 'R');
                        l.ew.red.forEach(m => m.material.color.set(ewS === 'R' ? 0xff0000 : 0x220000));
                        l.ew.yellow.forEach(m => m.material.color.set(ewS === 'Y' ? 0xffff00 : 0x222200));
                        l.ew.green.forEach(m => m.material.color.set(ewS === 'G' ? 0x00ff00 : 0x002200));
                    });
                };
                updateLights();

                // 電車・踏切のアニメーション
                trainTimer++;
                const cycle = trainTimer % 800;
                const isTrainApproaching = (cycle > 500 && cycle < 750);
                const isTrainPassing = (cycle >= 750 || cycle <= 50);

                for (let i = crossingGates.length - 1; i >= 0; i--) {
                    const g = crossingGates[i];
                    if (g.barGroup.parent === null || g.barGroup.parent.parent === null) {
                        crossingGates.splice(i, 1); continue;
                    }
                    const targetRot = isTrainApproaching || isTrainPassing ? 0 : Math.PI / 2;
                    g.barGroup.rotation.z += (targetRot - g.barGroup.rotation.z) * 0.05;
                    if (isTrainApproaching || isTrainPassing) {
                        const flash = Math.floor(Date.now() / 300) % 2;
                        g.lights[0].material.color.set(flash === 0 ? 0xff0000 : 0x330000);
                        g.lights[2].material.color.set(flash === 0 ? 0xff0000 : 0x330000);
                        g.lights[1].material.color.set(flash === 1 ? 0xff0000 : 0x330000);
                        g.lights[3].material.color.set(flash === 1 ? 0xff0000 : 0x330000);
                    } else {
                        g.lights.forEach(l => l.material.color.set(0x330000));
                    }
                    if (g.barGroup.rotation.z < 0.5) {
                        const gateWorldPos = new THREE.Vector3();
                        g.barGroup.getWorldPosition(gateWorldPos);
                        if (Math.abs(playerVehicle.position.x - gateWorldPos.x) < 8 && Math.abs(playerVehicle.position.z - gateWorldPos.z) < 2) {
                            endGame("踏切強行突破で事故");
                        }
                    }
                }

                if (cycle === 750) {
                    const lineGZ = Math.round(playerVehicle.position.z / (GRID_SIZE * 4)) * 4;
                    const train = createTrain();
                    train.position.set(-1000, 3, lineGZ * GRID_SIZE);
                    trains.push({ mesh: train });
                }

                trains.forEach((t, i) => {
                    t.mesh.position.x += 15;
                    const relX = playerVehicle.position.x - t.mesh.position.x;
                    if (Math.abs(playerVehicle.position.z - t.mesh.position.z) < 8 && relX > 0 && relX < 200) {
                        endGame("電車に撥ねられました");
                    }
                    if (t.mesh.position.x > 1000) {
                        scene.remove(t.mesh); trains.splice(i, 1);
                    }
                });

                // NPC
                carSpawnTimer++;
                if (carSpawnTimer > 60 && npcCars.length < 15) {
                    carSpawnTimer = 0;
                    const car = createCar();
                    const isNS = Math.random() > 0.5;
                    const dist = 160;
                    const spawnOffset = (Math.random() > 0.5 ? 1 : -1) * dist;
                    const moveDir = Math.random() > 0.5 ? 1 : -1;
                    if (isNS) {
                        const gx = Math.round(playerVehicle.position.x / GRID_SIZE);
                        const laneX = moveDir * 4;
                        car.position.set(gx * GRID_SIZE + laneX, 0, playerVehicle.position.z + spawnOffset);
                        car.rotation.y = moveDir > 0 ? 0 : Math.PI;
                        npcCars.push({ mesh: car, dir: new THREE.Vector3(0,0,moveDir), speed: 0, targetSpeed: 0.3 + Math.random() * 0.3 });
                    } else {
                        const gz = Math.round(playerVehicle.position.z / GRID_SIZE);
                        if (gz % 4 !== 0) {
                            const laneZ = -moveDir * 4;
                            car.position.set(playerVehicle.position.x + spawnOffset, 0, gz * GRID_SIZE + laneZ);
                            car.rotation.y = moveDir > 0 ? Math.PI/2 : -Math.PI/2;
                            npcCars.push({ mesh: car, dir: new THREE.Vector3(moveDir,0,0), speed: 0, targetSpeed: 0.3 + Math.random() * 0.3 });
                        } else { scene.remove(car); }
                    }
                }

                npcCars.forEach((c, i) => {
                    const gx = Math.round(c.mesh.position.x / GRID_SIZE);
                    const gz = Math.round(c.mesh.position.z / GRID_SIZE);
                    const normX = ((c.mesh.position.x % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
                    const normZ = ((c.mesh.position.z % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
                    const isNS = Math.abs(c.dir.z) > Math.abs(c.dir.x);
                    const isRailway = (gz % 4 === 0); // ここで定義
                    const distToNextIntersection = isNS ? (c.dir.z > 0 ? (GRID_SIZE - normZ) : normZ) : (c.dir.x > 0 ? (GRID_SIZE - normX) : normX);
                    
                    let shouldStop = false;
                    const stopDist = 60;
                    
                    // 信号判定 (線路タイルでない場合のみ)
                    if (!isRailway) {
                        if (isNS) { 
                            if (distToNextIntersection < stopDist && distToNextIntersection > 5 && trafficPhase !== 0) shouldStop = true; 
                        } else { 
                            if (distToNextIntersection < stopDist && distToNextIntersection > 5 && trafficPhase !== 3) shouldStop = true; 
                        }
                    }
                    
                    // 踏切判定 (線路タイルかつ南北走行の場合のみ)
                    if (isRailway && isNS) {
                        const relZTrain = (c.mesh.position.z % (GRID_SIZE * 4) + (GRID_SIZE * 4)) % (GRID_SIZE * 4);
                        const dTrain = (c.dir.z > 0) ? ((GRID_SIZE * 4) - relZTrain) : relZTrain;
                        if (dTrain < 60 && dTrain > 5 && (cycle > 500 || cycle < 100)) shouldStop = true;
                    }

                    // 追い越し
                    let needsOvertake = false;
                    if (distToNextIntersection >= 60 && !shouldStop && c.speed > 0.1) {
                        npcCars.forEach((other, oi) => {
                            if (i === oi) return;
                            const d = c.mesh.position.distanceTo(other.mesh.position);
                            if (d < 25 && other.mesh.position.clone().sub(c.mesh.position).dot(c.dir) > 0.8 * d && other.speed < c.targetSpeed * 0.7) needsOvertake = true;
                        });
                    }

                    const targetLaneOffset = isNS ? (c.dir.z > 0 ? 4 : -4) : (c.dir.x > 0 ? -4 : 4);
                    let currentOffset = isNS ? (c.mesh.position.x - gx * GRID_SIZE) : (c.mesh.position.z - gz * GRID_SIZE);
                    if (needsOvertake) {
                        const rightVec = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), c.dir).normalize();
                        c.mesh.position.add(rightVec.multiplyScalar(0.15));
                    } else {
                        const diff = targetLaneOffset - currentOffset;
                        if (Math.abs(diff) > 0.1) {
                            if (isNS) c.mesh.position.x += (diff > 0 ? 1 : -1) * 0.08;
                            else c.mesh.position.z += (diff > 0 ? 1 : -1) * 0.08;
                        }
                    }

                    c.speed += ( (shouldStop ? 0 : c.targetSpeed) - c.speed) * 0.05;
                    c.mesh.position.add(c.dir.clone().multiplyScalar(c.speed));

                    const collisionDist = gameMode === 'BIKE' ? 3.2 : 5.0;
                    if (playerVehicle.position.distanceTo(c.mesh.position) < collisionDist) endGame("一般車と衝突しました");
                    if (playerVehicle.position.distanceTo(c.mesh.position) > 200) { scene.remove(c.mesh); npcCars.splice(i, 1); }
                });

                // 自機操作
                if (keys['KeyW'] || keys['ArrowUp']) speed += ACCEL;
                else if (keys['KeyS'] || keys['ArrowDown']) speed -= BRAKE;
                else {
                    speed -= Math.sign(speed) * DECEL;
                    if (Math.abs(speed) < 0.01) speed = 0;
                }
                const max = nitroTimer > 0 ? SPEED_NITRO_MAX : SPEED_MAX;
                speed = Math.max(-0.2, Math.min(max, speed));

                if (Math.abs(speed) > 0.05) {
                    const steerDir = speed > 0 ? 1 : -1;
                    if (keys['KeyA'] || keys['ArrowLeft']) currentRotationY += STEER_SPEED * steerDir;
                    else if (keys['KeyD'] || keys['ArrowRight']) currentRotationY -= STEER_SPEED * steerDir;
                }
                playerVehicle.rotation.z = (keys['KeyA'] || keys['ArrowLeft']) ? 0.15 : (keys['KeyD'] || keys['ArrowRight'] ? -0.15 : 0);
                direction.set(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), currentRotationY);
                playerVehicle.position.add(direction.clone().multiplyScalar(speed));
                playerVehicle.rotation.y = currentRotationY;

                // 信号無視判定 (共通)
                const relX = ((playerVehicle.position.x % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
                const relZ = ((playerVehicle.position.z % GRID_SIZE) + GRID_SIZE) % GRID_SIZE;
                const inIntersection = (relX < 15 || relX > GRID_SIZE - 15) && (relZ < 15 || relZ > GRID_SIZE - 15);
                const gz_now = Math.round(playerVehicle.position.z / GRID_SIZE);
                const isRailwayTile = (gz_now % 4 === 0);

                if (inIntersection && !isRailwayTile) {
                    if (!intersectionProcessed && Math.abs(speed) > 0.1) {
                        let isIllegal = (Math.abs(direction.z) > Math.abs(direction.x)) ? (trafficPhase >= 2) : (trafficPhase <= 2 || trafficPhase === 5);
                        // 右左折中の救済
                        if (isIllegal) {
                            if ((trafficPhase === 0 || trafficPhase === 1) && Math.abs(direction.x) > 0.5) isIllegal = false;
                            if ((trafficPhase === 3 || trafficPhase === 4) && Math.abs(direction.z) > 0.5) isIllegal = false;
                        }

                        if (isIllegal) {
                            const alert = document.getElementById('center-alert');
                            if (gameMode === 'BIKE') {
                                fuel -= 20;
                                alert.innerText = "🚨 信号無視！ -20 GAS";
                                alert.style.color = "#ff0000";
                            } else {
                                alert.innerText = "🚨 信号を守ってください！";
                                alert.style.color = "#ffaa00";
                            }
                            alert.style.display = 'block';
                            setTimeout(() => { if (alert.innerText.includes("信号")) alert.style.display = 'none'; }, 2000);
                        }
                        intersectionProcessed = true;
                    }
                } else {
                    intersectionProcessed = false;
                }

                // バイクモード限定の燃料消費
                if (gameMode === 'BIKE') {
                    if (Math.abs(speed) > 0.01) fuel -= 0.01 + (Math.abs(speed) * 0.02);
                    if (fuel <= 0) endGame("ガス欠になりました");
                    document.getElementById('fuel-fill').style.width = fuel + '%';
                    if (fuel < 30) {
                        document.getElementById('fuel-fill').style.background = '#ff0000';
                        if (!needsRefuel) setRandomTarget();
                    }
                }

                // 道路生成
                const gx = Math.round(playerVehicle.position.x / GRID_SIZE);
                const gz = Math.round(playerVehicle.position.z / GRID_SIZE);
                for(let x=-1; x<=1; x++) {
                    for(let z=-1; z<=1; z++) {
                        const k = `${gx+x},${gz+z}`;
                        if (!roads.has(k)) roads.set(k, createRoadTile(gx+x, gz+z));
                    }
                }

                score += Math.floor(Math.abs(speed) * 2);
                document.getElementById('score').innerText = `${gameMode === 'BIKE' ? '配達' : '走行'}距離: ${score}m`;
                document.getElementById('speed').innerText = `時速: ${Math.floor(Math.abs(speed) * 120)} km/h`;
                if (nitroTimer > 0) { nitroTimer--; document.getElementById('nitro-fill').style.width = (nitroTimer/300*100)+'%'; }
                
                const distToTarget = playerVehicle.position.distanceTo(targetPos);
                document.getElementById('distance-text').innerText = `あと ${Math.floor(distToTarget)}m`;
                document.getElementById('distance-text').style.color = distToTarget < 25 ? "#0f0" : "#fff";
                document.getElementById('interact-prompt').style.display = (distToTarget < (gameMode === 'BIKE' ? 30 : 25) && Math.abs(speed) < 0.1) ? 'block' : 'none';

                camera.position.lerp(playerVehicle.position.clone().add(new THREE.Vector3(0, gameMode === 'BIKE' ? 7 : 10, gameMode === 'BIKE' ? 15 : 25).applyAxisAngle(new THREE.Vector3(0,1,0), currentRotationY)), 0.1);
                camera.lookAt(playerVehicle.position.x, 1.5, playerVehicle.position.z);

                buildingMeshes.forEach(b => {
                    if (immuneBuilding && b.pos.distanceTo(immuneBuilding) < 1) return;
                    const hitDist = gameMode === 'BIKE' ? b.size/2+1.2 : b.size/2+2.5;
                    if (Math.abs(playerVehicle.position.x - b.pos.x) < hitDist && Math.abs(playerVehicle.position.z - b.pos.z) < hitDist) {
                        if (!b.isTarget) endGame("建物に衝突しました");
                    }
                });

                ring.rotation.z += 0.05;
                navLine.geometry.setFromPoints([playerVehicle.position.clone().add(new THREE.Vector3(0, 0.5, 0)), targetPos.clone().add(new THREE.Vector3(0, 0.5, 0))]);
                navLine.computeLineDistances(); 
            }
            updateMap();
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        document.getElementById('bike-btn').addEventListener('click', () => {
            gameMode = 'BIKE';
            document.getElementById('fuel-ui').style.display = 'block';
            document.getElementById('start-screen').style.display = 'none';
            setupVehicle('BIKE');
            gameState = 'PLAYING'; setRandomTarget();
        });

        document.getElementById('bus-btn').addEventListener('click', () => {
            gameMode = 'BUS';
            document.getElementById('fuel-ui').style.display = 'none';
            document.getElementById('start-screen').style.display = 'none';
            setupVehicle('BUS');
            gameState = 'PLAYING'; setRandomTarget();
        });

        document.getElementById('retry-btn').addEventListener('click', () => {
            document.getElementById('game-over').style.display = 'none';
            // 状態のリセット
            score = 0;
            deliveryCount = 0;
            fuel = 100;
            speed = 0;
            nitroTimer = 0;
            needsRefuel = false;
            fuelMarker.visible = false;
            fuelNavLine.visible = false;
            intersectionProcessed = false;
            
            // 乗り物の再セットアップ
            setupVehicle(gameMode);
            gameState = 'PLAYING';
            setRandomTarget();
        });
        function endGame(msg) {
            gameState = 'GAMEOVER'; document.getElementById('game-over').style.display = 'flex';
            document.getElementById('cause').innerText = msg;
            document.getElementById('final-score').innerText = `記録: ${score}m / 配達: ${deliveryCount}件`;
        }
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        update();
    </script>
</body>
</html>
